<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Beacon - Kanban</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <span class="material-symbols-outlined icon-btn">grid_view</span>
            <span class="material-symbols-outlined icon-btn mt">work</span>
        </div>
        <div class="sidebar-bottom">
            <span class="material-symbols-outlined icon-btn">directions_run</span>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="app-header">
            <div class="header-left">
                <div class="brand">
                    <h1>Build Beacon</h1>
                    <span class="material-symbols-outlined">expand_more</span>
                </div>
                <button class="nav-btn">Start sprint</button>
            </div>
            <div class="header-right">
                <span class="material-symbols-outlined icon-btn">visibility</span>
                <button class="btn-save-login" id="login-btn">Save & Login</button>
            </div>
        </header>

        <div class="board-wrapper">
            <div class="board-container" id="board">
                <!-- Columns generated by JS -->
            </div>
            <button id="add-column-btn" class="vertical-add-btn">
                <span class="material-symbols-outlined">add</span> Add Column
            </button>
        </div>
    </main>

    <!-- Generic Modal for input (Add/Edit Task/Col) -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Action</h2>
            <input type="text" id="modal-input" placeholder="Type here..." autofocus autocomplete="off">
            <div class="modal-actions">
                <button id="modal-cancel" class="text-btn">Cancel</button>
                <button id="modal-save" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
        <div class="modal-content login-style">
            <h2>Welcome Back</h2>
            <input type="email" id="login-email" placeholder="Email" autocomplete="off">
            <input type="password" id="login-password" placeholder="Password">
            <div class="modal-actions">
                <button id="login-cancel" class="text-btn">Cancel</button>
                <button id="login-submit" class="primary-btn white-btn">Login</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
